<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>portfolio</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #terminal { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="terminal"></div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script>
    const term = new Terminal({
      cursorBlink: false,
      fontFamily: '"Courier New", Courier, monospace',
      fontSize: 14,
      theme: { background: '#000000', foreground: '#ffffff', cursor: '#ffffff' },
    });

    const fit = new FitAddon.FitAddon();
    term.loadAddon(fit);
    term.open(document.getElementById('terminal'));
    fit.fit();
    term.focus();

    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}/ws`);
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => { sendResize(); term.focus(); };

    ws.onmessage = e => term.write(new Uint8Array(e.data));

    ws.onclose = () => term.write('\r\n\r\nDisconnected. Refresh to reconnect.');

    term.onData(data => {
      if (data === '\x03') return; // suppress Ctrl+C
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(new TextEncoder().encode(data));
      }
    });

    function sendResize() {
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
      }
    }

    window.addEventListener('resize', () => { fit.fit(); sendResize(); });
  </script>
</body>
</html>
